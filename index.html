<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Clientes - Full Stack</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        form { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 4px; }
        .btn-save { background: #28a745; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
        .btn-edit { background: #ffc107; margin-left: 10px; }
        .btn-del { background: #dc3545; color: white; margin-left: 5px; }
        ul { list-style: none; padding: 0; }
        li { border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <h1>Sistema de Clientes</h1>

    <form id="clientForm">
        <h3 id="formTitle">Novo Cliente</h3>
        <input type="hidden" id="clientId"> <input type="text" id="nome" placeholder="Nome Completo" required>
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="text" id="uf" placeholder="UF (Ex: RN)" maxlength="2" required>
        
        <button type="submit" class="btn-save" id="btnSubmit">Cadastrar Cliente</button>
        <button type="button" class="btn-cancel" id="btnCancel" style="display:none;" onclick="resetForm()">Cancelar</button>
    </form>

    <h2>Clientes Cadastrados</h2>
    <ul id="lista"></ul>

    <script>
        const API_URL = 'http://localhost:3000/clients';
        const form = document.getElementById('clientForm');
        const lista = document.getElementById('lista');

        // 1. CARREGAR (GET)
        async function carregarClientes() {
            const res = await fetch(API_URL);
            const clientes = await res.json();
            lista.innerHTML = clientes.map(c => `
                <li>
                    <span><strong>${c.nome}</strong> (${c.uf})<br><small>${c.email}</small></span>
                    <div>
                        <button class="btn-edit" onclick="prepararEdicao(${c.id}, '${c.nome}', '${c.email}', '${c.uf}')">Editar</button>
                        <button class="btn-del" onclick="deletar(${c.id})">Excluir</button>
                    </div>
                </li>
            `).join('');
        }

        // 2. CADASTRAR OU ATUALIZAR (POST ou PUT)
        form.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('clientId').value;
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                uf: document.getElementById('uf').value
            };

            const metodo = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, {
                method: metodo,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            resetForm();
            carregarClientes();
        };

        // 3. EXCLUIR (DELETE)
        async function deletar(id) {
            if (confirm("Deseja realmente excluir este cliente?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                carregarClientes();
            }
        }

        // 4. PREPARAR EDIÇÃO (Lógica de Front-end)
        function prepararEdicao(id, nome, email, uf) {
            document.getElementById('clientId').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('email').value = email;
            document.getElementById('uf').value = uf;

            document.getElementById('formTitle').innerText = "Editando Cliente";
            document.getElementById('btnSubmit').innerText = "Salvar Alterações";
            document.getElementById('btnCancel').style.display = "inline-block";
        }

        function resetForm() {
            form.reset();
            document.getElementById('clientId').value = "";
            document.getElementById('formTitle').innerText = "Novo Cliente";
            document.getElementById('btnSubmit').innerText = "Cadastrar Cliente";
            document.getElementById('btnCancel').style.display = "none";
        }

        // Inicialização
        carregarClientes();
    </script>
</body>
</html>
