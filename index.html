<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Gerenciador de Clientes</title>
</head>
<body>
    <h1>Cadastro de Clientes</h1>
    
    <form id="clientForm"> //essa parte é conectada com o backend, onde o formulário é enviado para o servidor
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="uf" placeholder="UF" maxlength="2" required>
        <button type="submit">Cadastrar</button>
    </form>

    <h2>Lista de Clientes</h2>
    <ul id="lista"></ul> //essa também é conectada com o backend, onde a lista de clientes é exibida dinamicamente

    <script>
        const form = document.getElementById('clientForm'); //atribui o formulário a uma variável para facilitar o acesso
        const lista = document.getElementById('lista');

        // FUNÇÃO PARA BUSCAR CLIENTES (GET)
        async function carregarClientes() {
            const response = await fetch('http://localhost:3000/clients');
            const clientes = await response.json();
            lista.innerHTML = clientes.map(c => `<li>${cliente.nome} - ${cliente.uf}</li>`).join('');
        }

        // FUNÇÃO PARA ENVIAR CLIENTE (POST)
        form.onsubmit = async (e) => {
            e.preventDefault();
            const novoCliente = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                uf: document.getElementById('uf').value
            };

            await fetch('http://localhost:3000/clients', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novoCliente)
            });

            form.reset();
            carregarClientes(); // Atualiza a lista automaticamente
        };

        carregarClientes(); // Carrega ao abrir a página
    </script>
</body>
</html>
